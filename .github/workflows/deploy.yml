name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip unit tests (emergency deploy)'
        type: boolean
        default: false
      run_e2e:
        description: 'Run Playwright e2e tests (slow; off by default)'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  # Needed by the release job so it can dispatch rollback-deploy.yml for a
  # freshly-cut tag (GITHUB_TOKEN pushes don't trigger downstream workflows).
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        if: ${{ !inputs.skip_tests }}
        run: pnpm test

  test-e2e:
    if: ${{ inputs.run_e2e }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 14

  release:
    # Only cut releases from real pushes to main. workflow_dispatch re-runs
    # (emergency redeploys, etc.) never trigger semantic-release; they just
    # rebuild and redeploy whatever's on main.
    runs-on: ubuntu-latest
    needs: [test, test-e2e]
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.test.result == 'success' &&
      (needs.test-e2e.result == 'success' || needs.test-e2e.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with:
          # semantic-release needs the full history + tags.
          fetch-depth: 0
          # Persist the GITHUB_TOKEN creds so @semantic-release/git can push
          # the CHANGELOG.md + package.json bump back to main.
          persist-credentials: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture tag count before release
        id: tags_before
        run: echo "count=$(git tag -l 'v*' | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release

      - name: Dispatch rollback-deploy for the new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # semantic-release pushes its tag via GITHUB_TOKEN, which does not
          # trigger downstream workflows. Explicitly dispatch rollback-deploy
          # if a new v-tag just appeared on the remote.
          git fetch --tags --quiet
          after=$(git tag -l 'v*' | wc -l | tr -d ' ')
          before=${{ steps.tags_before.outputs.count }}
          if [ "$after" -le "$before" ]; then
            echo "No new tag — nothing to snapshot."
            exit 0
          fi
          new_tag=$(git describe --tags --abbrev=0)
          new_version="${new_tag#v}"
          echo "Dispatching rollback-deploy for $new_tag (version=$new_version)"
          gh workflow run rollback-deploy.yml --ref "$new_tag" -f version="$new_version"

  deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    needs: [test, test-e2e, release]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.test-e2e.result == 'success' || needs.test-e2e.result == 'skipped') &&
      (needs.release.result == 'success' || needs.release.result == 'skipped')
    steps:
      # Check out the HEAD of main (not github.sha), so we pick up the
      # [skip ci] release commit + tag if semantic-release just cut one.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_METERED_API_KEY: ${{ secrets.VITE_METERED_API_KEY }}

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Fetch gh-pages for versions.json regeneration
        run: |
          if git ls-remote --exit-code --heads "https://github.com/${GITHUB_REPOSITORY}.git" gh-pages >/dev/null; then
            git clone --depth 1 --branch gh-pages "https://github.com/${GITHUB_REPOSITORY}.git" gh-pages-checkout
          else
            echo "gh-pages branch does not exist yet; starting with empty versions list"
            mkdir -p gh-pages-checkout
          fi

      - name: Regenerate versions.json from current gh-pages
        run: node scripts/build-versions-json.mjs --from-dir gh-pages-checkout --out dist/versions.json

      - name: Deploy mainline to gh-pages root
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          clean-exclude: |
            v/**
